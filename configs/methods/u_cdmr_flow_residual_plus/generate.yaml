generation:
  mask_source: descriptor_flow
  residual_source: flow
  flow_steps: 32
  flow_sampler: heun
  flow_sigma: 0.35
  flow_max_delta: 0.5
  same_domain_only: true
  tile_size: 768
  tile_overlap: 128
  native_output: true
filter:
  max_residual_leak: 0.1
  max_outside_change: 0.005
  min_mask_residual_iou: 0.01
  per_domain:
    camera:
      max_residual_leak: 0.1
      max_outside_change: 0.005
      min_mask_area: 0.000001
      max_mask_area: 0.08
      min_mask_residual_iou: 0.01
    phone:
      max_residual_leak: 0.1
      max_outside_change: 0.005
      min_mask_area: 0.000001
      max_mask_area: 0.08
      min_mask_residual_iou: 0.01
    dphone:
      max_residual_leak: 0.1
      max_outside_change: 0.005
      min_mask_area: 0.000001
      max_mask_area: 0.08
      min_mask_residual_iou: 0.01
