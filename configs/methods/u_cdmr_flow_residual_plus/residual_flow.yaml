model:
  type: residual_flow_dit
  base_channels: 48
  style_dim: 16
  time_dim: 128
  condition_channels: 7
  dit_patch_size: 32
  dit_hidden_size: 384
  dit_depth: 8
  dit_num_heads: 6
  dit_mlp_ratio: 4.0
training:
  objective: rectified_flow
  x1: gate_masked_real_crack_minus_pseudo_normal
  x0: gate_masked_gaussian_noise
  flow_sigma: 0.25
  max_velocity: 1.0
  image_mode: full_native
  native_output: true
  no_global_resize: true
  no_training_crop: true
loss:
  flow_mse: 1.0
  outside_mse: 0.25
  velocity_leak: 1.0
  velocity_tv: 0.02
  velocity_chroma: 0.05
sampling:
  sampler: heun
  steps: 32
  formula: I_syn = I_normal + gate(M_syn) * Delta_flow
